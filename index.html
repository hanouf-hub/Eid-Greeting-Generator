<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صانع بطاقات العيد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS Variables ─────────────────────────────────────── */
    :root {
      --accent:       #8d6a6a;
      --accent-light: #b39090;
      --accent-dark:  #6b4e4e;
      --bg:           #faf8f5;
      --surface:      #ffffff;
      --surface-2:    #f4f0eb;
      --border:       #e8e0d8;
      --text:         #2c2420;
      --text-muted:   #9b8f88;
      --shadow:       0 4px 24px rgba(141,106,106,0.10);
      --shadow-lg:    0 12px 48px rgba(141,106,106,0.18);
      --radius:       18px;
      --radius-sm:    10px;
      --transition:   0.28s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Readex Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Decorative Background ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(141,106,106,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(141,106,106,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ────────────────────────────────────────────── */
    .header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 52px 24px 36px;
    }

    .header-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .header-ornament span {
      display: inline-block;
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-light));
    }
    .header-ornament span:last-child {
      background: linear-gradient(90deg, var(--accent-light), transparent);
    }

    .ornament-icon {
      font-size: 22px;
      filter: drop-shadow(0 2px 6px rgba(141,106,106,0.3));
    }

    .header h1 {
      font-size: clamp(26px, 5vw, 44px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.25;
    }

    .header h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .header p {
      margin-top: 10px;
      font-size: clamp(14px, 2vw, 17px);
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.2px;
    }

    /* ─── Main Layout ───────────────────────────────────────── */
    .main {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 32px;
      align-items: start;
    }

    /* ─── Preview Panel (Left) ──────────────────────────────── */
    .preview-panel {
      position: sticky;
      top: 32px;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    .canvas-wrapper {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      transition: box-shadow var(--transition);
    }

    .canvas-wrapper:hover {
      box-shadow: 0 20px 60px rgba(141,106,106,0.22);
    }

    #previewCanvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
    }

    /* ─── Controls Panel (Right) ────────────────────────────── */
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* ─── Template Gallery ──────────────────────────────────── */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .template-item {
      position: relative;
      cursor: pointer;
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 4/3;
      border: 2px solid transparent;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .template-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(141,106,106,0.2);
    }

    .template-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(141,106,106,0.15);
    }

    .template-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
    }

    /* Placeholder thumbs when no image provided */
    .template-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .template-thumb-placeholder svg {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.22));
    }

    .template-thumb-placeholder .tpl-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.9px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      padding: 0 6px;
      line-height: 1.3;
      font-family: 'Readex Pro', sans-serif;
    }

    .template-check {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: white;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity var(--transition), transform var(--transition);
    }

    .template-item.active .template-check {
      opacity: 1;
      transform: scale(1);
    }

    /* ─── Form Controls ─────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .input-field {
      font-family: 'Readex Pro', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      direction: rtl;
    }

    .input-field::placeholder { color: var(--text-muted); }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(141,106,106,0.12);
    }

    /* ─── Font Select ───────────────────────────────────────── */
    select.input-field {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 6l4 4 4-4' stroke='%238d6a6a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: left 14px center;
      padding-left: 38px;
    }

    /* ─── Color Row ─────────────────────────────────────────── */
    .color-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .color-swatch {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      flex-shrink: 0;
    }

    .color-swatch:hover { transform: scale(1.15); }

    .color-swatch.active {
      border-color: var(--text);
      box-shadow: 0 0 0 3px rgba(44,36,32,0.12);
    }

    /* ─── Slider ────────────────────────────────────────────── */
    .slider-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-wrapper input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(to left, var(--accent) 0%, var(--accent) var(--fill, 50%), var(--border) var(--fill, 50%), var(--border) 100%);
      outline: none;
      cursor: pointer;
    }

    .slider-wrapper input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 2px 8px rgba(141,106,106,0.4);
      transition: transform var(--transition);
    }

    .slider-wrapper input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      min-width: 30px;
      text-align: center;
    }

    /* ─── Action Button ─────────────────────────────────────── */
    .btn-download {
      font-family: 'Readex Pro', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border: none;
      border-radius: var(--radius-sm);
      padding: 16px 28px;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
      box-shadow: 0 4px 20px rgba(141,106,106,0.35);
      letter-spacing: 0.3px;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(141,106,106,0.45);
      filter: brightness(1.05);
    }

    .btn-download:active { transform: translateY(0); }

    /* ─── Success Toast ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Footer ────────────────────────────────────────────── */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 24px 40px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ─── Responsive ────────────────────────────────────────── */
    @media (max-width: 820px) {
      .main {
        grid-template-columns: 1fr;
      }
      .preview-panel {
        position: static;
        order: -1;
      }
    }

    @media (max-width: 480px) {
      .header { padding: 36px 16px 24px; }
      .main { padding: 0 16px 60px; gap: 20px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-ornament">
      <span></span>
      <span class="ornament-icon">✦</span>
      <span></span>
    </div>
    <h1>اصنع <em>بهجة العيد</em> بلمستك</h1>
    <p>اختر تصميمك، أضف اسمك، وشارك من تحب.</p>
  </header>

  <!-- ─── Main ─────────────────────────────────────────────────── -->
  <main class="main">

    <!-- ── Preview (Left Column) ── -->
    <section class="preview-panel">
      <p class="panel-label">كيف ستبدو؟</p>
      <div class="canvas-wrapper">
        <canvas id="previewCanvas" width="1080" height="1080"></canvas>
      </div>
    </section>

    <!-- ── Controls (Right Column) ── -->
    <aside class="controls-panel">

      <!-- Template Gallery -->
      <div class="card">
        <div class="card-title"><span class="dot"></span> اختر القالب (صُممت بعناية)</div>
        <div class="template-grid" id="templateGrid">
          <!-- Templates are injected by JS -->
        </div>
      </div>

      <!-- Name Input -->
      <div class="card">
        <div class="card-title"><span class="dot"></span> مِن من هذه التهنئة؟</div>
        <div class="form-group">
          <input
            id="nameInput"
            class="input-field"
            type="text"
            maxlength="40"
            placeholder="اكتب الاسم هنا.."
          />
        </div>
      </div>

      <!-- Font & Color & Size -->
      <div class="card">
        <div class="card-title"><span class="dot"></span> خصّص المظهر</div>
        <div style="display:flex; flex-direction:column; gap:18px;">

          <!-- Font -->
          <div class="form-group">
            <label class="form-label" for="fontSelect">الخط المفضل</label>
            <select id="fontSelect" class="input-field">
              <option value="'Readex Pro', sans-serif">Readex Pro</option>
              <option value="'Scheherazade New', serif">Scheherazade New</option>
              <option value="'Amiri', serif">Amiri</option>
              <option value="'Lateef', serif">Lateef</option>
            </select>
          </div>

          <!-- Color -->
          <div class="form-group">
            <label class="form-label">لمسة لونية متناغمة</label>
            <div class="color-row" id="colorRow">
              <!-- Swatches injected by JS -->
            </div>
          </div>

          <!-- Font Size -->
          <div class="form-group">
            <label class="form-label" for="fontSizeSlider">حجم الخط</label>
            <div class="slider-wrapper">
              <input
                type="range"
                id="fontSizeSlider"
                min="28"
                max="96"
                value="56"
                step="2"
              />
              <span class="slider-value" id="sizeLabel">56</span>
            </div>
          </div>

        </div>
      </div>

      <!-- Download -->
      <button class="btn-download" id="downloadBtn">
        <span>احفظ التهنئة وانشر الفرحة</span>
        <span>✨</span>
      </button>

    </aside>
  </main>

  <!-- ─── Footer ──────────────────────────────────────────────── -->
  <footer class="footer">
    صُنع بمحبة لإدخال البهجة في قلوب الأحبة 🌙
  </footer>

  <!-- ─── Toast ────────────────────────────────────────────────── -->
  <div class="toast" id="toast">تم حفظ البطاقة بنجاح! 🎉</div>


  <script>
    /* ═══════════════════════════════════════════════════════════
       ██  CONFIGURATION — Edit this section to customize
    ══════════════════════════════════════════════════════════════

    HOW TO ADD YOUR IMAGES:
    ─────────────────────────────────────────────────────────────
    For each template below, replace the `imageUrl` value with
    either a relative path  → "images/eid-card-1.jpg"
    or an absolute URL      → "https://example.com/card1.jpg"

    HOW TO ADJUST TEXT POSITION:
    ─────────────────────────────────────────────────────────────
    Each template has a `textConfig` object with x/y coordinates
    (in pixels on the 1080×1080 canvas):
      • x  → horizontal center of the text area
      • y  → ★ MAIN AXIS to adjust — move text up (lower number)
              or down (higher number) on the card
      • maxWidth → maximum line width in pixels before wrapping

    The canvas is 1080×1080 px.
    ═══════════════════════════════════════════════════════════ */

    const TEMPLATES = [
      {
        id: 1,
        label: 'تصميم ١',
        emoji: '🌙',
        // ─── TEMPLATE 1: Paste your image URL below ──────────────
        imageUrl: '',   // e.g. "https://i.imgur.com/XXXXXX.jpg"
        // ─────────────────────────────────────────────────────────
        placeholderGradient: ['#c9a96e', '#8b6347'],   // shown when no image
        textConfig: {
          x: 540,       // horizontal center (don't change unless needed)
          y: 720,       // ★ ADJUST THIS — vertical position of name
          maxWidth: 860
        }
      },
      {
        id: 2,
        label: 'تصميم ٢',
        emoji: '✨',
        // ─── TEMPLATE 2: Paste your image URL below ──────────────
        imageUrl: '',   // e.g. "https://i.imgur.com/YYYYYY.jpg"
        // ─────────────────────────────────────────────────────────
        placeholderGradient: ['#a8c5b5', '#5d8a76'],
        textConfig: {
          x: 540,
          y: 650,       // ★ ADJUST THIS — vertical position of name
          maxWidth: 800
        }
      },
      {
        id: 3,
        label: 'تصميم ٣',
        emoji: '🌸',
        // ─── TEMPLATE 3: Paste your image URL below ──────────────
        imageUrl: '',   // e.g. "https://i.imgur.com/ZZZZZZ.jpg"
        // ─────────────────────────────────────────────────────────
        placeholderGradient: ['#b5a0c9', '#7d5a9a'],
        textConfig: {
          x: 540,
          y: 780,       // ★ ADJUST THIS — vertical position of name
          maxWidth: 900
        }
      }
    ];

    /* ─── Color Palette ─────────────────────────────────────── */
    const COLOR_SWATCHES = [
      { color: '#ffffff', label: 'أبيض ناصع' },
      { color: '#f5e6d0', label: 'كريمي دافئ' },
      { color: '#8d6a6a', label: 'وردي معتق' },
      { color: '#5d4037', label: 'بني عميق' },
      { color: '#c9a96e', label: 'ذهبي أصيل' },
      { color: '#3e5c3f', label: 'أخضر هادئ' },
      { color: '#1a1a2e', label: 'ليلي فاخر' },
    ];

    /* ══════════════════════════════════════════════════════════
       ██  STATE
    ══════════════════════════════════════════════════════════ */
    let activeTemplate = 0;
    let activeColor    = COLOR_SWATCHES[0].color;
    let loadedImages   = [];   // cached HTMLImageElement per template

    const canvas   = document.getElementById('previewCanvas');
    const ctx      = canvas.getContext('2d');

    /* ══════════════════════════════════════════════════════════
       ██  SVG ICONS FOR TEMPLATE PLACEHOLDERS
    ══════════════════════════════════════════════════════════ */
    const TEMPLATE_ICONS = [
      // Icon 1 — Ornate Fanoos (Ramadan/Eid Lantern)
      `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- chain -->
        <line x1="24" y1="2" x2="24" y2="7" stroke="rgba(255,255,255,0.9)" stroke-width="1.8" stroke-linecap="round"/>
        <!-- top cap -->
        <path d="M17 10 Q24 7 31 10 L29 14 Q24 12 19 14Z" fill="rgba(255,255,255,0.85)"/>
        <!-- body -->
        <path d="M19 14 Q10 22 11 32 Q14 39 24 41 Q34 39 37 32 Q38 22 29 14Z" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.9)" stroke-width="1.8"/>
        <!-- vertical ribs -->
        <path d="M24 14 Q20 22 20 32 Q21 38 24 41" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" fill="none"/>
        <path d="M24 14 Q28 22 28 32 Q27 38 24 41" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" fill="none"/>
        <!-- horizontal band -->
        <path d="M13 26 Q24 28 35 26" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" fill="none"/>
        <!-- glow dot -->
        <circle cx="24" cy="27" r="3.5" fill="rgba(255,255,255,0.35)"/>
        <circle cx="24" cy="27" r="1.8" fill="rgba(255,255,255,0.8)"/>
        <!-- bottom tassel -->
        <line x1="24" y1="41" x2="24" y2="46" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="24" cy="46" r="1.5" fill="rgba(255,255,255,0.8)"/>
      </svg>`,

      // Icon 2 — Eight-pointed Islamic Star (geometric art)
      `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- outer 8-pointed star -->
        <polygon points="24,3 27.5,16 38,10 31,20.5 45,22.5 32.5,27 39,38 27,33.5 24,45 21,33.5 9,38 15.5,27 3,22.5 17,20.5 10,10 20.5,16"
          fill="rgba(255,255,255,0.85)" />
        <!-- inner octagon cutout -->
        <polygon points="24,10 28.5,18 37.5,20 31,27 32.5,36.5 24,33 15.5,36.5 17,27 10.5,20 19.5,18"
          fill="rgba(255,255,255,0.12)" />
        <!-- center circle -->
        <circle cx="24" cy="24" r="5" fill="rgba(255,255,255,0.0)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
        <circle cx="24" cy="24" r="2.2" fill="rgba(255,255,255,0.9)"/>
      </svg>`,

      // Icon 3 — Crescent & Dome Mosque silhouette
      `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- ground -->
        <rect x="4" y="38" width="40" height="2.5" rx="1.2" fill="rgba(255,255,255,0.5)"/>
        <!-- left minaret -->
        <rect x="7" y="24" width="5" height="14" rx="1.5" fill="rgba(255,255,255,0.75)"/>
        <path d="M7 24 Q9.5 19 12 24Z" fill="rgba(255,255,255,0.9)"/>
        <!-- right minaret -->
        <rect x="36" y="24" width="5" height="14" rx="1.5" fill="rgba(255,255,255,0.75)"/>
        <path d="M36 24 Q38.5 19 41 24Z" fill="rgba(255,255,255,0.9)"/>
        <!-- main dome body -->
        <rect x="14" y="30" width="20" height="8" rx="1.5" fill="rgba(255,255,255,0.8)"/>
        <!-- dome arc -->
        <path d="M14 30 Q24 14 34 30Z" fill="rgba(255,255,255,0.85)"/>
        <!-- crescent on top of dome -->
        <path d="M26.5 13 C23 13.5 20.5 16 21 19 C18 17.5 17 14 19.5 11.5 C22 9 25.5 9.5 27 12Z" fill="rgba(255,255,255,0.95)"/>
        <!-- star next to crescent -->
        <polygon points="29,10 29.7,12 31.5,12 30.2,13.2 30.7,15 29,14 27.3,15 27.8,13.2 26.5,12 28.3,12"
          fill="rgba(255,255,255,0.9)" transform="scale(0.72) translate(12, 2)"/>
        <!-- windows -->
        <path d="M20 34 Q22 31 24 34Z" fill="rgba(255,255,255,0.3)"/>
        <path d="M24 34 Q26 31 28 34Z" fill="rgba(255,255,255,0.3)"/>
      </svg>`
    ];

    /* ══════════════════════════════════════════════════════════
       ██  BUILD TEMPLATE GALLERY
    ══════════════════════════════════════════════════════════ */
    function buildGallery() {
      const grid = document.getElementById('templateGrid');
      grid.innerHTML = '';
      TEMPLATES.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = 'template-item' + (i === activeTemplate ? ' active' : '');
        item.dataset.index = i;

        if (t.imageUrl) {
          // Real image thumbnail
          const img = document.createElement('img');
          img.className = 'template-thumb';
          img.src = t.imageUrl;
          img.alt = t.label;
          item.appendChild(img);
        } else {
          // SVG icon placeholder
          const ph = document.createElement('div');
          ph.className = 'template-thumb-placeholder';
          ph.style.background = `linear-gradient(145deg, ${t.placeholderGradient[0]}, ${t.placeholderGradient[1]})`;
          ph.innerHTML = TEMPLATE_ICONS[i] + `<span class="tpl-label">${t.label}</span>`;
          item.appendChild(ph);
        }

        const check = document.createElement('div');
        check.className = 'template-check';
        check.textContent = '✓';
        item.appendChild(check);

        item.addEventListener('click', () => selectTemplate(i));
        grid.appendChild(item);
      });
    }

    function selectTemplate(i) {
      activeTemplate = i;
      document.querySelectorAll('.template-item').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });
      render();
    }

    /* ══════════════════════════════════════════════════════════
       ██  BUILD COLOR SWATCHES
    ══════════════════════════════════════════════════════════ */
    function buildColorRow() {
      const row = document.getElementById('colorRow');
      row.innerHTML = '';
      COLOR_SWATCHES.forEach(s => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch' + (s.color === activeColor ? ' active' : '');
        sw.style.background = s.color;
        sw.title = s.label;
        if (s.color === '#ffffff' || s.color === '#f5e6d0') {
          sw.style.border = '1.5px solid #d0c8c0';
        }
        sw.addEventListener('click', () => {
          activeColor = s.color;
          document.querySelectorAll('.color-swatch').forEach(el => {
            el.classList.toggle('active', el.style.background === s.color ||
              el.style.backgroundColor === s.color);
          });
          // fix: compare by dataset
          row.querySelectorAll('.color-swatch').forEach((el, idx) => {
            el.classList.toggle('active', COLOR_SWATCHES[idx].color === activeColor);
          });
          render();
        });
        row.appendChild(sw);
      });
    }

    /* ══════════════════════════════════════════════════════════
       ██  LOAD IMAGES (with caching)
    ══════════════════════════════════════════════════════════ */
    function loadTemplateImage(index) {
      return new Promise(resolve => {
        if (loadedImages[index]) { resolve(loadedImages[index]); return; }
        const url = TEMPLATES[index].imageUrl;
        if (!url) { resolve(null); return; }
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => { loadedImages[index] = img; resolve(img); };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    /* ══════════════════════════════════════════════════════════
       ██  RENDER CANVAS
    ══════════════════════════════════════════════════════════ */
    async function render() {
      const W = canvas.width;
      const H = canvas.height;
      const tpl = TEMPLATES[activeTemplate];
      const name = document.getElementById('nameInput').value;
      const font = document.getElementById('fontSelect').value;
      const size = parseInt(document.getElementById('fontSizeSlider').value, 10);

      ctx.clearRect(0, 0, W, H);

      // 1 — Background
      const img = await loadTemplateImage(activeTemplate);

      if (img) {
        // Draw real image, cover-fit
        const scale = Math.max(W / img.width, H / img.height);
        const sw = img.width  * scale;
        const sh = img.height * scale;
        const sx = (W - sw) / 2;
        const sy = (H - sh) / 2;
        ctx.drawImage(img, sx, sy, sw, sh);
      } else {
        // Draw placeholder gradient
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, tpl.placeholderGradient[0]);
        grad.addColorStop(1, tpl.placeholderGradient[1]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Placeholder emoji & instruction
        ctx.save();
        ctx.font         = `300 32px 'Readex Pro', sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalAlpha  = 0.6;
        ctx.fillStyle    = '#ffffff';
        ctx.fillText('أضف رابط الصورة في الكود', W / 2, H / 2 + 48);
        ctx.restore();
      }

      // 2 — Text overlay (only if name entered)
      if (name.trim()) {
        const { x, y, maxWidth } = tpl.textConfig;

        // Soft shadow for legibility
        ctx.save();
        ctx.shadowColor   = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur    = 24;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 4;

        ctx.font         = `600 ${size}px ${font}`;
        ctx.fillStyle    = activeColor;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.direction    = 'rtl';

        // Simple word-wrap
        drawWrappedText(ctx, name, x, y, maxWidth, size * 1.35);

        ctx.restore();
      }
    }

    /* ─── Word Wrap Helper ──────────────────────────────────── */
    function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(' ');
      let line = '';
      const lines = [];

      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);

      const totalH = lines.length * lineHeight;
      const startY = y - totalH / 2 + lineHeight / 2;

      lines.forEach((l, i) => {
        ctx.fillText(l, x, startY + i * lineHeight);
      });
    }

    /* ══════════════════════════════════════════════════════════
       ██  DOWNLOAD
    ══════════════════════════════════════════════════════════ */
    document.getElementById('downloadBtn').addEventListener('click', () => {
      // Re-render at full 1080×1080 resolution first
      render().then(() => {
        const link = document.createElement('a');
        link.download = 'eid-greeting-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast();
      });
    });

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    /* ══════════════════════════════════════════════════════════
       ██  SLIDER FILL UPDATE
    ══════════════════════════════════════════════════════════ */
    const slider    = document.getElementById('fontSizeSlider');
    const sizeLabel = document.getElementById('sizeLabel');

    function updateSliderFill() {
      const min = slider.min, max = slider.max, val = slider.value;
      const pct = ((val - min) / (max - min) * 100).toFixed(1) + '%';
      slider.style.setProperty('--fill', pct);
      sizeLabel.textContent = val;
    }

    slider.addEventListener('input', () => { updateSliderFill(); render(); });
    updateSliderFill();

    /* ══════════════════════════════════════════════════════════
       ██  LIVE UPDATE LISTENERS
    ══════════════════════════════════════════════════════════ */
    document.getElementById('nameInput').addEventListener('input',  render);
    document.getElementById('fontSelect').addEventListener('change', render);

    /* ══════════════════════════════════════════════════════════
       ██  EXTRA FONT LOADING (for canvas)
    ══════════════════════════════════════════════════════════ */
    async function loadExtraFonts() {
      const fonts = [
        { family: 'Scheherazade New', url: 'https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@600&display=swap' },
        { family: 'Amiri',           url: 'https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap' },
        { family: 'Lateef',          url: 'https://fonts.googleapis.com/css2?family=Lateef:wght@600&display=swap' },
      ];
      for (const f of fonts) {
        if (!document.querySelector(`link[href*="${f.family.replace(' ', '+')}"]`)) {
          const link = document.createElement('link');
          link.rel  = 'stylesheet';
          link.href = f.url;
          document.head.appendChild(link);
        }
      }
      // Wait for fonts
      await document.fonts.ready;
    }

    /* ══════════════════════════════════════════════════════════
       ██  INIT
    ══════════════════════════════════════════════════════════ */
    (async () => {
      buildGallery();
      buildColorRow();
      await loadExtraFonts();
      await render();
    })();
  </script>
